# Retail/EC BFF GraphQL schema(F6 で実 backend 接続)。
#
# inventory-read-model の `GET /v1/inventories/{inventoryId}` を BFF から叩いて
# 在庫スナップショットを返す。 SKU 単位の集約は inventory-read-model に
# secondary index API を追加するか、 1 query で SKU + location 配列を要求する
# `inventories(skuId)` リストを別途用意するかで後続フェーズで決定。

scalar DateTime

type Inventory {
  id: ID!
  skuId: ID!
  locationId: ID!
  available: Int!
  reserved: Int!
  version: Int!
}

type Query {
  """単一 inventory を inventory-read-model から取得。 該当 id が無ければ null。"""
  inventory(inventoryId: ID!): Inventory

  """SLA confirm 用、 BFF が起動しているかを返す trivial query。"""
  health: String!
}
