# Manufacturing BFF GraphQL schema(F6 phase 2 で実 backend 接続)。
# services/manufacturing の REST `GET /v1/work-orders/{workOrderId}` を集約する。

scalar Date

type WorkOrder {
  id: ID!
  code: String!
  productSkuCode: ID!
  locationId: ID!
  plannedQuantity: Int!
  status: WorkOrderStatus!
  plannedStartDate: Date
  version: Int!
}

enum WorkOrderStatus {
  PLANNED
  RELEASED
  COMPLETED
  CANCELLED
}

type Query {
  workOrder(workOrderId: ID!): WorkOrder
  health: String!
}
