# Manufacturing BFF GraphQL schema(F6 phase 2 で実 backend 接続)。
# services/manufacturing の REST `GET /v1/work-orders/{workOrderId}` を集約する。

scalar Date

type WorkOrder {
  id: ID!
  code: String!
  productSkuCode: ID!
  locationId: ID!
  plannedQuantity: Int!
  status: WorkOrderStatus!
  plannedStartDate: Date
  version: Int!
}

enum WorkOrderStatus {
  PLANNED
  RELEASED
  COMPLETED
  CANCELLED
}

"""
F7 phase 5b: BFF が verify 済みの user claim を web app に降ろす query。
未認証(BFF が JWT verify を skip している dev mode 等)では null。
"""
type Viewer {
  userId: ID!
  tenantId: ID!
  roles: [String!]!
  locale: String!
  locations: [ID!]!
  partners: [ID!]!
}

type Query {
  workOrder(workOrderId: ID!): WorkOrder
  viewer: Viewer
  health: String!
}
