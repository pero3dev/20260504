# Wholesale BFF GraphQL schema(F6 phase 2)。 卸取引向け UI が
# 受注の状態 + 取引先別契約価格 + 出荷確定の状況を 1 画面で見られるようにする。
# backing service: services/wholesale REST。

scalar Date

type SalesOrder {
  id: ID!
  code: String!
  partnerCode: String!
  status: SalesOrderStatus!
  currency: String!
  totalAmount: Float!
  requestedDeliveryDate: Date
  items: [SalesOrderLine!]!
  version: Int!
}

type SalesOrderLine {
  skuCode: ID!
  locationId: ID!
  quantity: Int!
  unitPrice: Float!
}

enum SalesOrderStatus {
  PLACED
  SHIPPED
  CANCELLED
}

"""
F7 phase 5b: BFF が verify 済みの user claim を web app に降ろす query。
未認証(BFF が JWT verify を skip している dev mode 等)では null。
"""
type Viewer {
  userId: ID!
  tenantId: ID!
  roles: [String!]!
  locale: String!
  locations: [ID!]!
  partners: [ID!]!
}

type Query {
  salesOrder(orderId: ID!): SalesOrder
  viewer: Viewer

  health: String!
}
