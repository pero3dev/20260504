# 3PL BFF GraphQL schema(F6 phase 2)。 倉庫オペレータ向け UI が
# 入出庫計画を 1 画面で取れるようにする。 backing service: services/tpl REST。

type StockMovement {
  id: ID!
  code: String!
  partnerCode: String!
  skuCode: ID!
  locationId: ID!
  movementType: MovementType!
  quantity: Int!
  status: MovementStatus!
  referenceCode: String
  version: Int!
}

enum MovementType {
  INBOUND
  OUTBOUND
  ADJUSTMENT
}

enum MovementStatus {
  PLANNED
  RECEIVED
  DISPATCHED
  CANCELLED
}

"""
F7 phase 5b: BFF が verify 済みの user claim を web app に降ろす query。
未認証(BFF が JWT verify を skip している dev mode 等)では null。
"""
type Viewer {
  userId: ID!
  tenantId: ID!
  roles: [String!]!
  locale: String!
  locations: [ID!]!
  partners: [ID!]!
}

type Query {
  stockMovement(movementId: ID!): StockMovement
  viewer: Viewer

  health: String!
}
