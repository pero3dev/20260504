# 3PL BFF GraphQL schema(F6 phase 2)。 倉庫オペレータ向け UI が
# 入出庫計画を 1 画面で取れるようにする。 backing service: services/tpl REST。

type StockMovement {
  id: ID!
  code: String!
  partnerCode: String!
  skuCode: ID!
  locationId: ID!
  movementType: MovementType!
  quantity: Int!
  status: MovementStatus!
  referenceCode: String
  version: Int!
}

enum MovementType {
  INBOUND
  OUTBOUND
  ADJUSTMENT
}

enum MovementStatus {
  PLANNED
  RECEIVED
  DISPATCHED
  CANCELLED
}

type Query {
  stockMovement(movementId: ID!): StockMovement

  health: String!
}
