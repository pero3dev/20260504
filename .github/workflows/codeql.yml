# CodeQL による SAST(GitHub Advanced Security、ADR-0012/D5-1)。
#
# 実行タイミング:
#   - PR (main向け): 新規/変更コードのスキャン
#   - main 直push: ベースラインの継続更新
#   - 週次スケジュール: ルール更新後の再スキャン

name: CodeQL

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  schedule:
    # 毎週日曜 03:00 UTC(JST 月曜 12:00)。
    - cron: '0 3 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Java)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # security-and-quality は security-extended より厳しいクエリも含む。
          queries: security-and-quality

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # CodeQL は手動ビルドが信頼性高い(autobuild は失敗することがある)。
      - name: Maven compile (skip tests)
        run: mvn -B -ntp -DskipTests compile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:java-kotlin'
