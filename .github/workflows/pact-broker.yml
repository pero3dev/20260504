# Pact Broker 連携(ADR-0019 Phase 3 / 3.5)。
#
# トリガと job 構成:
#   PR (main 向け):
#     publish → provider-verify → can-i-deploy
#       1) PR HEAD で Consumer 契約を生成 → Broker に ephemeral tag(pr-NNN)で publish
#       2) 4 Provider を Broker 経由で verify(結果は Broker に publish back)
#       3) can-i-deploy で「main 環境にこの consumer を入れて良いか」を機械判定
#
#   main 直push:
#     publish → provider-verify
#       1) main の Consumer 契約を Broker に publish(tag = main)
#       2) 4 Provider verify(結果 publish back)。これで PR 側の can-i-deploy が緑になる
#
# 必要な GitHub secret:
#   - PACT_BROKER_URL       (例: https://pact-broker.example.com)
#   - PACT_BROKER_USERNAME  (Basic Auth)
#   - PACT_BROKER_PASSWORD  (Basic Auth)
#
# 上記が未設定なら全 job が skip される。 Broker hosting が確定するまで dormant な状態で main に置ける。
name: Pact Broker

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: pact-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Publish Consumer Contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      broker_configured: ${{ steps.check.outputs.broker_configured }}
      consumer_version: ${{ steps.version.outputs.consumer_version }}
      consumer_tag: ${{ steps.version.outputs.consumer_tag }}
      branch: ${{ steps.version.outputs.branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if Broker not configured
        id: check
        run: |
          if [ -z "${{ secrets.PACT_BROKER_URL }}" ]; then
            echo "broker_configured=false" >> "$GITHUB_OUTPUT"
            echo "PACT_BROKER_URL secret 未設定。 全 job skip。"
          else
            echo "broker_configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute consumer version + tag + branch
        id: version
        run: |
          # Phase 5: branch metadata で consumer version selectors の mainBranch / matchingBranch
          # が機能する。 Provider verify は同じ branch identifier で動かして整合性を保つ。
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "consumer_version=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            echo "consumer_tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "branch=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "consumer_version=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "consumer_tag=main" >> "$GITHUB_OUTPUT"
            echo "branch=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.check.outputs.broker_configured == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run consumer Pact tests
        if: steps.check.outputs.broker_configured == 'true'
        run: |
          mvn -B -ntp -pl services/inventory-core \
            -Dspotless.check.skip=true \
            -Dtest='*ConsumerPactTest' test

      - name: Publish to Pact Broker
        if: steps.check.outputs.broker_configured == 'true'
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        run: |
          mvn -B -ntp -pl services/inventory-core pact:publish \
            -Dpact.broker.url="$PACT_BROKER_URL" \
            -Dpact.broker.username="$PACT_BROKER_USERNAME" \
            -Dpact.broker.password="$PACT_BROKER_PASSWORD" \
            -Dpact.consumer.version="${{ steps.version.outputs.consumer_version }}" \
            -Dpact.consumer.tags="${{ steps.version.outputs.consumer_tag }}" \
            -Dpact.consumer.branch="${{ steps.version.outputs.branch }}"

  provider-verify:
    name: Provider Verify (Broker)
    needs: publish
    if: needs.publish.outputs.broker_configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        provider: [ wholesale, retail-ec, manufacturing, tpl ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Broker 経路の Provider Pact test は @EnabledIfEnvironmentVariable(PACT_BROKER_URL) で gate。
      # pact.verifier.publishResults=true で verify 結果を Broker へ publish back し、
      # can-i-deploy が「Provider X が Consumer Y のバージョン Z に対して verify 緑」と判定できるようにする。
      - name: Verify against Pact Broker
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        run: |
          # Broker URL を host / port / scheme に分解
          BROKER_HOST=$(echo "$PACT_BROKER_URL" | sed -E 's|^https?://([^/:]+).*|\1|')
          BROKER_PORT=$(echo "$PACT_BROKER_URL" | sed -E 's|^https?://[^/:]+:?([0-9]*).*|\1|')
          BROKER_SCHEME=$(echo "$PACT_BROKER_URL" | sed -E 's|^(https?)://.*|\1|')
          if [ -z "$BROKER_PORT" ]; then
            BROKER_PORT=$( [ "$BROKER_SCHEME" = "https" ] && echo 443 || echo 80 )
          fi

          # Phase 5: pact.provider.branch を渡して selector matchingBranch / mainBranch を機能させる。
          # consumer 側 publish と同じ branch identifier(main / pr-NN)を使うのが重要。
          mvn -B -ntp -pl services/${{ matrix.provider }} \
            -Dspotless.check.skip=true \
            -Dtest='*BrokerPactTest' \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -Dpactbroker.host="$BROKER_HOST" \
            -Dpactbroker.port="$BROKER_PORT" \
            -Dpactbroker.scheme="$BROKER_SCHEME" \
            -Dpactbroker.auth.username="$PACT_BROKER_USERNAME" \
            -Dpactbroker.auth.password="$PACT_BROKER_PASSWORD" \
            -Dpact.verifier.publishResults=true \
            -Dpact.provider.version="${{ github.sha }}" \
            -Dpact.provider.tag="${{ needs.publish.outputs.branch }}" \
            -Dpact.provider.branch="${{ needs.publish.outputs.branch }}" \
            test

  can-i-deploy:
    name: can-i-deploy
    needs: [ publish, provider-verify ]
    if: github.event_name == 'pull_request' && needs.publish.outputs.broker_configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: can-i-deploy (consumer = inventory-core, target = main)
        env:
          PACT_BROKER_URL: ${{ secrets.PACT_BROKER_URL }}
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
        run: |
          docker run --rm \
            -e PACT_BROKER_BASE_URL="$PACT_BROKER_URL" \
            -e PACT_BROKER_USERNAME="$PACT_BROKER_USERNAME" \
            -e PACT_BROKER_PASSWORD="$PACT_BROKER_PASSWORD" \
            pactfoundation/pact-cli:latest \
            broker can-i-deploy \
              --pacticipant inventory-core \
              --version "${{ needs.publish.outputs.consumer_version }}" \
              --to-environment main
