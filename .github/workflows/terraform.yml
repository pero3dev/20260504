# Terraform CI workflow(F2 phase F follow-up)。
#
# `infra/**/*.tf` の変更時に format check + validate を回し、 prod デプロイ前に
# 構文 / 設定不整合を検知する。 backend は使わず `-backend=false` で init するので
# AWS credential は不要(provider plugin の download だけで完結)。
#
# 将来追加候補:
#   - tflint(naming / unused resource / deprecated 検知)
#   - terraform plan -detailed-exitcode による drift 検知(週次 cron + read-only AWS
#     credential、 0 以外で Slack 通知)
#   - checkov / tfsec(SecOps 静的解析)
#
# モジュールが増えたら matrix で並列化する想定。 現状 cognito 1 モジュールなので直書き。
name: Terraform

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/**/*.tf'
      - 'infra/**/*.tfvars*'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'infra/**/*.tf'
      - 'infra/**/*.tfvars*'
      - '.github/workflows/terraform.yml'

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt-check:
    name: Format check (terraform fmt -recursive)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      - name: terraform fmt -check -recursive infra/
        run: terraform fmt -check -recursive infra/

  validate-cognito:
    name: Validate cognito module
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: infra/cognito/terraform
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      # backend を使わず provider plugin だけ取得する。 AWS credential 不要。
      - name: terraform init -backend=false
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  validate-bootstrap:
    name: Validate bootstrap stack (ADR-0024)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: infra/aws/stacks/bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      # bootstrap stack は backend.tf がコメント済みなので backend なしで init できる。
      # 実 apply は operator が AWS credential を持って実行する 1-time setup (本 stack の README 参照)。
      - name: terraform init -backend=false
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  validate-iam-baseline:
    name: Validate iam-baseline stack (ADR-0024)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: infra/aws/stacks/iam-baseline
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      # backend は bootstrap が用意済 (S3) だが、 CI では `-backend=false` で provider plugin
      # だけ取得して validate のみ。 AWS credential 不要。
      - name: terraform init -backend=false
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  validate-vpc:
    name: Validate vpc stack (ADR-0024)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: infra/aws/stacks/vpc
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      # vpc stack は env 依存 (per-env tfvars/backend) だが、 validate 自体は env 非依存。
      # `-backend=false` で provider plugin と terraform-aws-modules/vpc/aws を download し
      # validate のみ実行。 AWS credential 不要。
      - name: terraform init -backend=false
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  validate-kms:
    name: Validate kms stack (ADR-0024)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: infra/aws/stacks/kms
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
          terraform_wrapper: false

      # kms stack は env 依存だが validate は env 非依存。 modules/kms-key を 4 回 instantiate
      # しているので module resolution + provider plugin の download だけで validate 完結。
      - name: terraform init -backend=false
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate
