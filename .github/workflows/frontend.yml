# Frontend CI workflow。
#
# Java backend の ci.yml(Maven 経路)とは独立に動かす。 frontend/ 配下の変更だけが
# トリガで、 Java 変更には反応しない(逆も同様)。
#
# F1 で per-app step + soft-fail で原因切分けし、 F3 で turbo run 統合 + 全 step 緑化に戻した。
name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  build-test:
    name: Build & Test (Node 20 + pnpm 9)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          # setup-node@v5 は package.json の packageManager フィールド検出で auto-cache する
          # ようになったが、 frontend/pnpm-lock.yaml はまだ未コミットで cache key が算出できず
          # 失敗するため無効化。 lockfile を commit に含めたら cache: 'pnpm' を有効化する。
          package-manager-cache: false

      # 初回 commit 時点では pnpm-lock.yaml が無いため frozen-lockfile を外す。 lockfile が
      # CI artifact 経由で frontend/pnpm-lock.yaml に commit されたら --frozen-lockfile に切替。
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck (turbo run typecheck)
        run: pnpm typecheck

      - name: Lint (turbo run lint)
        run: pnpm lint

      - name: Build (turbo run build)
        run: pnpm build

      - name: Test (turbo run test)
        run: pnpm test

      - name: Upload pnpm-lock.yaml
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pnpm-lock
          path: frontend/pnpm-lock.yaml
          if-no-files-found: warn
          retention-days: 7
