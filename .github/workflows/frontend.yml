# Frontend CI workflow(F1 follow-up)。
#
# Java backend の ci.yml(Maven 経路)とは独立に動かす。 frontend/ 配下の変更だけが
# トリガで、 Java 変更には反応しない(逆も同様)。
#
# F1 では各 step を per-app に分割し continue-on-error にすることで、 どの app の
# どの step が失敗しているかをジョブ API から特定しやすくしている。 lockfile commit +
# 全 step 緑化が確認できたら通常の `turbo run *` に統合する。
name: Frontend CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  build-test:
    name: Build & Test (Node 20 + pnpm 9)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Per-app に分けて continue-on-error にする(F1 一時措置)。 どの step が落ちたかは jobs API から
      # 各 step の conclusion で特定可能。 lockfile + 全 step 緑化が確認できたら turbo run typecheck に統合。
      - name: Typecheck shared
        continue-on-error: true
        run: pnpm --filter '@inventory/shared' typecheck

      - name: Typecheck bff-retail-ec
        continue-on-error: true
        run: pnpm --filter bff-retail-ec typecheck

      - name: Typecheck web-retail-ec
        continue-on-error: true
        run: pnpm --filter web-retail-ec typecheck

      - name: Lint shared
        continue-on-error: true
        run: pnpm --filter '@inventory/shared' lint

      - name: Lint bff-retail-ec
        continue-on-error: true
        run: pnpm --filter bff-retail-ec lint

      - name: Lint web-retail-ec
        continue-on-error: true
        run: pnpm --filter web-retail-ec lint

      - name: Build shared
        continue-on-error: true
        run: pnpm --filter '@inventory/shared' build

      - name: Build bff-retail-ec
        continue-on-error: true
        run: pnpm --filter bff-retail-ec build

      - name: Build web-retail-ec
        continue-on-error: true
        run: pnpm --filter web-retail-ec build

      - name: Test shared (none)
        continue-on-error: true
        run: pnpm --filter '@inventory/shared' run --if-present test

      - name: Test bff-retail-ec
        continue-on-error: true
        run: pnpm --filter bff-retail-ec test

      - name: Test web-retail-ec
        continue-on-error: true
        run: pnpm --filter web-retail-ec test

      # 後続フェーズで lockfile 化したいので artifact 化しておく(認証なしの API でも DL 可能)。
      - name: Upload pnpm-lock.yaml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-lock
          path: frontend/pnpm-lock.yaml
          if-no-files-found: warn
          retention-days: 7
