openapi: 3.0.3
info:
  title: Manufacturing API
  description: |
    Multi-tenant inventory platform — Manufacturing service (4th of the four
    business contexts). Production order management with BOM (Bill of Materials).

    Key trait vs. Wholesale: WorkOrder lifecycle is two-phase. `place` creates a
    PLANNED order with components snapshotted from the current BOM. `release`
    transitions to RELEASED and emits `manufacturing.work_order.released.v1`,
    which Inventory Core consumes to reserve component stock (saga wiring is
    a separate task).

    Bridge multi-tenancy: each tenant has its own schema.
    Errors follow RFC 7807; `errorCode` is the i18n key.
  version: 1.0.0

servers:
  - url: https://api.example.com/manufacturing
    description: Production
  - url: http://localhost:8088
    description: Local dev

tags:
  - name: work-orders
    description: Work order placement, release, and lookup

security:
  - bearerJwt: []

paths:
  /v1/work-orders:
    post:
      tags: [work-orders]
      operationId: placeWorkOrder
      summary: Place a new work order in PLANNED state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceWorkOrderRequest'
      responses:
        '201':
          description: Work order placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Work order code already exists in this tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '422':
          description: BOM not found for the requested product SKU
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/work-orders/{workOrderId}:
    parameters:
      - name: workOrderId
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      tags: [work-orders]
      operationId: getWorkOrder
      summary: Get work order by id
      responses:
        '200':
          description: Work order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/WorkOrderNotFound'

  /v1/work-orders/{workOrderId}/release:
    parameters:
      - name: workOrderId
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    post:
      tags: [work-orders]
      operationId: releaseWorkOrder
      summary: Release a planned work order, emitting manufacturing.work_order.released.v1
      responses:
        '200':
          description: Work order released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/WorkOrderNotFound'
        '409':
          description: Work order is not in a state that allows release
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  schemas:
    PlaceWorkOrderRequest:
      type: object
      required: [code, productSkuCode, locationId, plannedQuantity]
      properties:
        code:
          type: string
          pattern: '^[A-Z0-9][A-Z0-9-]{2,63}$'
          description: Tenant-unique work-order code
          example: WO-2026-0001
        productSkuCode:
          type: string
          maxLength: 64
          description: Finished-goods SKU to be produced
          example: SKU-WIDGET-X
        locationId:
          type: string
          maxLength: 64
          description: Production site (also where components are reserved from)
          example: LOC-FACTORY-A
        plannedQuantity:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000000
          description: Number of finished units planned
        plannedStartDate:
          type: string
          format: date
          description: Optional planned start date

    WorkOrderResponse:
      type: object
      required:
        - id
        - code
        - productSkuCode
        - locationId
        - plannedQuantity
        - status
        - components
        - version
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        productSkuCode:
          type: string
        locationId:
          type: string
        plannedQuantity:
          type: integer
          format: int32
        status:
          type: string
          enum: [PLANNED, RELEASED, COMPLETED, CANCELLED]
        plannedStartDate:
          type: string
          format: date
        components:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderComponentResponse'
        version:
          type: integer
          format: int64

    WorkOrderComponentResponse:
      type: object
      required: [componentSkuCode, quantityPerUnit]
      properties:
        componentSkuCode:
          type: string
        quantityPerUnit:
          type: integer
          format: int32
          description: Components needed per produced unit (BOM snapshot at place time)

    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, format: int32 }
        detail: { type: string }
        errorCode: { type: string }
        traceId: { type: string }

  responses:
    Unauthorized:
      description: Not authenticated, JWT invalid/expired
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    ValidationError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    WorkOrderNotFound:
      description: Work order does not exist in this tenant
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
