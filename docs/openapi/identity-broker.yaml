openapi: 3.0.3
info:
  title: Identity Broker API
  description: |
    Multi-tenant inventory platform — Identity Broker.

    Issues short-lived tenant-scoped JWTs and exposes a JWKS endpoint for downstream
    services to verify them. MVP scope:

    - `POST /v1/auth/sessions` — username/password login → session token + accessible tenants
    - `POST /v1/auth/tenant-sessions` — pick a tenant → tenant-scoped access token
    - `GET /.well-known/jwks.json` — public keys for JWT verification

    Future iterations: Cognito SAML federation, refresh tokens, step-up MFA.
  version: 1.0.0
  contact:
    name: Platform Team
    email: platform@example.com

servers:
  - url: https://idp.example.com
    description: Production
  - url: http://localhost:8081
    description: Local dev

tags:
  - name: sessions
    description: Authentication and tenant selection
  - name: jwks
    description: JSON Web Key Set for token verification
  - name: admin-tenants
    description: |
      Tenant lifecycle management (A5). All endpoints require a SUPER_ADMIN-scoped
      JWT. Mutations propagate to downstream services via best-effort runbook
      execution; see infra/tenant-provisioning/README.md.

paths:
  /v1/auth/sessions:
    post:
      tags: [sessions]
      operationId: createSession
      summary: Authenticate with credentials
      description: |
        Verifies username + password and returns a short-lived "session token" carrying
        the user's identity and the list of tenants they can access. The session token
        cannot access business APIs — it must be exchanged for a tenant-scoped access
        token via `POST /v1/auth/tenant-sessions`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'

  /v1/auth/tenant-sessions:
    post:
      tags: [sessions]
      operationId: selectTenant
      summary: Exchange session token for a tenant-scoped access token
      description: |
        Validates the session token, confirms the user has access to the requested
        tenant, and issues a 15-minute access token containing the resolved roles
        and data scopes for that tenant.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectTenantRequest'
      responses:
        '200':
          description: Tenant-scoped access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelectTenantResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Session token is valid but the user is not a member of the requested tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/admin/tenants:
    post:
      tags: [admin-tenants]
      operationId: registerTenant
      summary: Register a new tenant
      description: |
        Creates a tenant record in the broker. Idempotent on tenantId — re-registering
        an existing active tenant returns 409. Schema provisioning on the business
        databases is performed out-of-band; this endpoint only owns the broker-side
        record. Returns 201 with the canonical resource representation.
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterTenantRequest'
      responses:
        '201':
          description: Tenant registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResource'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: A tenant with this tenantId already exists
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    get:
      tags: [admin-tenants]
      operationId: listTenants
      summary: List all tenants
      description: |
        Returns all tenants known to the broker, including DEACTIVATED ones.
        Cursor-based pagination not yet wired (tenant count is bounded at the
        low hundreds); MVP returns the full list.
      security:
        - bearerJwt: []
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenantResource'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/admin/tenants/{tenantId}:
    get:
      tags: [admin-tenants]
      operationId: getTenant
      summary: Get a tenant by id
      security:
        - bearerJwt: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 32
            pattern: '^[a-z0-9][a-z0-9-]{2,31}$'
      responses:
        '200':
          description: Tenant resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResource'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: No tenant with this id
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/admin/tenants/{tenantId}/deactivate:
    post:
      tags: [admin-tenants]
      operationId: deactivateTenant
      summary: Deactivate a tenant
      description: |
        Marks the tenant as DEACTIVATED. Existing sessions remain valid until
        their TTL expires; new tenant-session issuance for this tenant fails.
        Idempotent — deactivating an already-DEACTIVATED tenant returns 200
        with the existing resource.
      security:
        - bearerJwt: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 32
            pattern: '^[a-z0-9][a-z0-9-]{2,31}$'
      responses:
        '200':
          description: Tenant deactivated (or was already DEACTIVATED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResource'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: No tenant with this id
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /.well-known/jwks.json:
    get:
      tags: [jwks]
      operationId: getJwks
      summary: JSON Web Key Set
      description: |
        Public keys downstream services use to verify tokens issued by this broker.
        Cached aggressively by clients; rotation is published here.
      security: []
      responses:
        '200':
          description: JWKS document
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  schemas:
    CreateSessionRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 1
          maxLength: 256

    CreateSessionResponse:
      type: object
      required: [sessionToken, expiresInSeconds, accessibleTenants]
      properties:
        sessionToken:
          type: string
          description: JWT carrying the user identity and a list of accessible tenants. No tenant scope.
        expiresInSeconds:
          type: integer
          format: int32
          example: 300
        accessibleTenants:
          type: array
          items:
            $ref: '#/components/schemas/AccessibleTenant'

    AccessibleTenant:
      type: object
      required: [tenantId, displayName]
      properties:
        tenantId:
          type: string
          example: acme
        displayName:
          type: string
          example: Acme Corporation

    SelectTenantRequest:
      type: object
      required: [sessionToken, tenantId]
      properties:
        sessionToken:
          type: string
        tenantId:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9][a-z0-9-]{2,31}$'

    SelectTenantResponse:
      type: object
      required: [accessToken, tokenType, expiresInSeconds]
      properties:
        accessToken:
          type: string
          description: "15-minute access token. Use as `Authorization: Bearer ...`"
        tokenType:
          type: string
          example: Bearer
        expiresInSeconds:
          type: integer
          format: int32
          example: 900

    RegisterTenantRequest:
      type: object
      required: [tenantId, displayName]
      properties:
        tenantId:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9][a-z0-9-]{2,31}$'
          description: External-facing tenant identifier. Stable for the lifetime of the tenant.
        displayName:
          type: string
          maxLength: 128
          description: Human-readable tenant name for UI / audit logs.

    TenantResource:
      type: object
      required: [tenantId, displayName, status, createdAt]
      properties:
        tenantId:
          type: string
        displayName:
          type: string
        status:
          type: string
          enum: [ACTIVE, DEACTIVATED]
        createdAt:
          type: string
          format: date-time
        deactivatedAt:
          type: string
          format: date-time
          nullable: true

    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        errorCode:
          type: string
        traceId:
          type: string

  responses:
    ValidationError:
      description: Request failed validation
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    AuthenticationFailed:
      description: Bad credentials or invalid session token
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
