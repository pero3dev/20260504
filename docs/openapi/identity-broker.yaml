openapi: 3.0.3
info:
  title: Identity Broker API
  description: |
    Multi-tenant inventory platform — Identity Broker.

    Issues short-lived tenant-scoped JWTs and exposes a JWKS endpoint for downstream
    services to verify them. MVP scope:

    - `POST /v1/auth/sessions` — username/password login → session token + accessible tenants
    - `POST /v1/auth/exchange` — exchange external IdP (Cognito SAML) access token → session token
    - `POST /v1/auth/tenant-sessions` — pick a tenant → tenant-scoped access token
    - `GET /.well-known/jwks.json` — public keys for JWT verification

    Future iterations: refresh tokens, step-up MFA, SAML JIT provisioning.
  version: 1.0.0
  contact:
    name: Platform Team
    email: platform@example.com

servers:
  - url: https://idp.example.com
    description: Production
  - url: http://localhost:8081
    description: Local dev

tags:
  - name: sessions
    description: Authentication and tenant selection
  - name: jwks
    description: JSON Web Key Set for token verification
  - name: admin-tenants
    description: |
      Tenant lifecycle management (A5). All endpoints require a SUPER_ADMIN-scoped
      JWT. Mutations propagate to downstream services via best-effort runbook
      execution; see infra/tenant-provisioning/README.md.
  - name: admin-users
    description: |
      User admin read API (A5 follow-up³). Read-only MVP — list and get user
      records. Write operations (register / deactivate / link membership) are
      future work pending an ADR on password vs. federation-only provisioning.
      All endpoints require a SUPER_ADMIN-scoped JWT and are audited
      (`read = true`) since admin viewing of user records is itself a J-SOX
      control point.

paths:
  /v1/auth/sessions:
    post:
      tags: [sessions]
      operationId: createSession
      summary: Authenticate with credentials
      description: |
        Verifies username + password and returns a short-lived "session token" carrying
        the user's identity and the list of tenants they can access. The session token
        cannot access business APIs — it must be exchanged for a tenant-scoped access
        token via `POST /v1/auth/tenant-sessions`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '200':
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'

  /v1/auth/exchange:
    post:
      tags: [sessions]
      operationId: exchangeFederatedToken
      summary: Exchange external IdP access token for an Identity Broker session token
      description: |
        Verifies an access token issued by an external IdP (typically AWS Cognito
        configured with SAML federation), looks up the corresponding internal user,
        and returns a session token + accessible tenants — same shape as
        `POST /v1/auth/sessions`. The federated subject claim (default `email`) must
        match a user that has already been provisioned in identity-broker. JIT
        provisioning is out of scope for this endpoint.

        Configuration is environment-driven on the server side
        (`platform.identity.federation.{issuer-uri,jwks-uri,subject-claim,
        audience,audience-claim}`). When unconfigured the endpoint returns 401.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExchangeFederatedTokenRequest'
      responses:
        '200':
          description: Federated token accepted, session issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: |
            Federated token invalid (signature / iss / exp / audience mismatch),
            federation unconfigured, or no internal user maps to the subject.
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/auth/tenant-sessions:
    post:
      tags: [sessions]
      operationId: selectTenant
      summary: Exchange session token for a tenant-scoped access token
      description: |
        Validates the session token, confirms the user has access to the requested
        tenant, and issues a 15-minute access token containing the resolved roles
        and data scopes for that tenant.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SelectTenantRequest'
      responses:
        '200':
          description: Tenant-scoped access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SelectTenantResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Session token is valid but the user is not a member of the requested tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/admin/tenants:
    post:
      tags: [admin-tenants]
      operationId: registerTenant
      summary: Register a new tenant
      description: |
        Creates a tenant record in the broker. Idempotent on tenantId — re-registering
        an existing active tenant returns 409. Schema provisioning on the business
        databases is performed out-of-band; this endpoint only owns the broker-side
        record. Returns 201 with the canonical resource representation.
      security:
        - bearerJwt: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterTenantRequest'
      responses:
        '201':
          description: Tenant registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResource'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: A tenant with this tenantId already exists
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
    get:
      tags: [admin-tenants]
      operationId: listTenants
      summary: List all tenants
      description: |
        Returns all tenants known to the broker, including DEACTIVATED ones.
        Cursor-based pagination not yet wired (tenant count is bounded at the
        low hundreds); MVP returns the full list.
      security:
        - bearerJwt: []
      responses:
        '200':
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TenantResource'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/admin/tenants/{tenantId}:
    get:
      tags: [admin-tenants]
      operationId: getTenant
      summary: Get a tenant by id
      security:
        - bearerJwt: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 32
            pattern: '^[a-z0-9][a-z0-9-]{2,31}$'
      responses:
        '200':
          description: Tenant resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResource'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: No tenant with this id
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/admin/tenants/{tenantId}/deactivate:
    post:
      tags: [admin-tenants]
      operationId: deactivateTenant
      summary: Deactivate a tenant
      description: |
        Marks the tenant as DEACTIVATED. Existing sessions remain valid until
        their TTL expires; new tenant-session issuance for this tenant fails.
        Idempotent — deactivating an already-DEACTIVATED tenant returns 200
        with the existing resource.

        Reserved tenants (currently `platform`, used for SUPER_ADMIN
        provisioning) cannot be deactivated and return 409.
      security:
        - bearerJwt: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 32
            pattern: '^[a-z0-9][a-z0-9-]{2,31}$'
      responses:
        '200':
          description: Tenant deactivated (or was already DEACTIVATED)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantResource'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: No tenant with this id
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: Tenant is reserved and cannot be deactivated (e.g. `platform`)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/admin/users:
    get:
      tags: [admin-users]
      operationId: listUsers
      summary: List all users
      description: |
        Returns all user records known to the broker. MVP returns the full list
        (cursor-based pagination not yet wired; user count is bounded at the low
        thousands for the SaaS scale targets). The response intentionally omits
        the password hash and any session-scoped state.
      security:
        - bearerJwt: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResource'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/admin/users/{userId}:
    get:
      tags: [admin-users]
      operationId: getUser
      summary: Get a user by id
      security:
        - bearerJwt: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: User resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResource'
        '401':
          $ref: '#/components/responses/AuthenticationFailed'
        '403':
          description: Caller lacks SUPER_ADMIN role
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: No user with this id
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /.well-known/jwks.json:
    get:
      tags: [jwks]
      operationId: getJwks
      summary: JSON Web Key Set
      description: |
        Public keys downstream services use to verify tokens issued by this broker.
        Cached aggressively by clients; rotation is published here.
      security: []
      responses:
        '200':
          description: JWKS document
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  schemas:
    CreateSessionRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 1
          maxLength: 256

    CreateSessionResponse:
      type: object
      required: [sessionToken, expiresInSeconds, accessibleTenants]
      properties:
        sessionToken:
          type: string
          description: JWT carrying the user identity and a list of accessible tenants. No tenant scope.
        expiresInSeconds:
          type: integer
          format: int32
          example: 300
        accessibleTenants:
          type: array
          items:
            $ref: '#/components/schemas/AccessibleTenant'

    AccessibleTenant:
      type: object
      required: [tenantId, displayName]
      properties:
        tenantId:
          type: string
          example: acme
        displayName:
          type: string
          example: Acme Corporation

    ExchangeFederatedTokenRequest:
      type: object
      required: [providerAccessToken]
      properties:
        providerAccessToken:
          type: string
          description: |
            Access token issued by the external IdP (Cognito User Pool configured with
            SAML federation). Must be a JWT signed by the IdP's published JWKS. The
            client never sees the underlying SAML assertion — Cognito mediates.

    SelectTenantRequest:
      type: object
      required: [sessionToken, tenantId]
      properties:
        sessionToken:
          type: string
        tenantId:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9][a-z0-9-]{2,31}$'

    SelectTenantResponse:
      type: object
      required: [accessToken, tokenType, expiresInSeconds]
      properties:
        accessToken:
          type: string
          description: "15-minute access token. Use as `Authorization: Bearer ...`"
        tokenType:
          type: string
          example: Bearer
        expiresInSeconds:
          type: integer
          format: int32
          example: 900

    RegisterTenantRequest:
      type: object
      required: [tenantId, displayName]
      properties:
        tenantId:
          type: string
          minLength: 3
          maxLength: 32
          pattern: '^[a-z0-9][a-z0-9-]{2,31}$'
          description: External-facing tenant identifier. Stable for the lifetime of the tenant.
        displayName:
          type: string
          maxLength: 128
          description: Human-readable tenant name for UI / audit logs.

    TenantResource:
      type: object
      required: [tenantId, displayName, status, createdAt]
      properties:
        tenantId:
          type: string
        displayName:
          type: string
        status:
          type: string
          enum: [ACTIVE, DEACTIVATED]
        createdAt:
          type: string
          format: date-time
        deactivatedAt:
          type: string
          format: date-time
          nullable: true

    UserResource:
      type: object
      required: [userId, email, displayName]
      description: |
        Admin-facing user view. Excludes the BCrypt password hash and any
        session-scoped state by design — admins should never see hashes.
      properties:
        userId:
          type: integer
          format: int64
          description: Snowflake user id.
        email:
          type: string
          format: email
        displayName:
          type: string

    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        errorCode:
          type: string
        traceId:
          type: string

  responses:
    ValidationError:
      description: Request failed validation
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    AuthenticationFailed:
      description: Bad credentials or invalid session token
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
