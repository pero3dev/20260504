openapi: 3.0.3
info:
  title: Wholesale API
  description: |
    Multi-tenant inventory platform — Wholesale service (3rd of the four
    business contexts). Sales orders for B2B partners.

    Key trait vs. Retail/EC: line `unitPrice` is **not** taken from the request.
    The server resolves it from `partner_price` master by `(partnerCode, skuCode)`
    so contracted prices are the single source of truth.

    Bridge multi-tenancy: each tenant has its own schema.
    Errors follow RFC 7807; `errorCode` is the i18n key.
  version: 1.0.0

servers:
  - url: https://api.example.com/wholesale
    description: Production
  - url: http://localhost:8087
    description: Local dev

tags:
  - name: sales-orders
    description: Sales order placement and lookup

security:
  - bearerJwt: []

paths:
  /v1/sales-orders:
    post:
      tags: [sales-orders]
      operationId: placeSalesOrder
      summary: Place a new sales order for a partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceSalesOrderRequest'
      responses:
        '201':
          description: Sales order placed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrderResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Sales order code already exists in this tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '422':
          description: Partner price not found for one of the lines
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/sales-orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      tags: [sales-orders]
      operationId: getSalesOrder
      summary: Get sales order by id
      responses:
        '200':
          description: Sales order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/SalesOrderNotFound'

  /v1/sales-orders/{orderId}/ship:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    post:
      tags: [sales-orders]
      operationId: shipSalesOrder
      summary: Confirm shipment of a placed sales order, emitting wholesale.order.shipped.v1
      responses:
        '200':
          description: Sales order shipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesOrderResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/SalesOrderNotFound'
        '409':
          description: Sales order is not in a state that allows shipment
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  schemas:
    PlaceSalesOrderRequest:
      type: object
      required: [code, partnerCode, currency, items]
      properties:
        code:
          type: string
          pattern: '^[A-Z0-9][A-Z0-9-]{2,63}$'
          description: Tenant-unique sales-order code
          example: SO-2026-0001
        partnerCode:
          type: string
          pattern: '^[A-Z0-9][A-Z0-9-]{2,63}$'
          description: Partner master code (governed by master-data service)
          example: PARTNER-ACME
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: JPY
        requestedDeliveryDate:
          type: string
          format: date
          description: Optional requested delivery date
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/SalesOrderLineRequest'

    SalesOrderLineRequest:
      type: object
      required: [skuCode, locationId, quantity]
      properties:
        skuCode:
          type: string
          maxLength: 64
          example: SKU-COCA-COLA-500ML
        locationId:
          type: string
          maxLength: 64
          description: |
            Source location for this line. Inventory Core resolves the inventory
            record by (skuCode, locationId) when consuming `wholesale.order.placed.v1`.
          example: LOC-TOKYO-A
        quantity:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000000

    SalesOrderResponse:
      type: object
      required: [id, code, partnerCode, status, currency, totalAmount, items, version]
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        partnerCode:
          type: string
        status:
          type: string
          enum: [PLACED, SHIPPED, CANCELLED]
        currency:
          type: string
        totalAmount:
          type: number
          format: double
        requestedDeliveryDate:
          type: string
          format: date
        items:
          type: array
          items:
            $ref: '#/components/schemas/SalesOrderLineResponse'
        version:
          type: integer
          format: int64

    SalesOrderLineResponse:
      type: object
      required: [skuCode, locationId, quantity, unitPrice]
      properties:
        skuCode:
          type: string
        locationId:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: number
          format: double
          description: Server-resolved partner contract price at order time

    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, format: int32 }
        detail: { type: string }
        errorCode: { type: string }
        traceId: { type: string }

  responses:
    Unauthorized:
      description: Not authenticated, JWT invalid/expired
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    ValidationError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    SalesOrderNotFound:
      description: Sales order does not exist in this tenant
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
