openapi: 3.0.3
info:
  title: 3PL API
  description: |
    Multi-tenant inventory platform — 3PL (Third-Party Logistics) service.

    Scope: stock movement (inbound / outbound / adjustment) planning and lookup.
    On confirmation it emits `tpl.stock.movement.v1` for downstream services
    (Inventory Core, Analytics, Integration Hub) to consume.

    Bridge multi-tenancy: each tenant has its own schema.
  version: 1.0.0

servers:
  - url: https://api.example.com/tpl
    description: Production
  - url: http://localhost:8086
    description: Local dev

tags:
  - name: stock-movements
    description: Stock movement planning and lookup

security:
  - bearerJwt: []

paths:
  /v1/stock-movements:
    post:
      tags: [stock-movements]
      operationId: planStockMovement
      summary: Plan a new stock movement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlanStockMovementRequest'
      responses:
        '201':
          description: Stock movement planned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Stock movement code already exists in this tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/stock-movements/{movementId}:
    parameters:
      - name: movementId
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      tags: [stock-movements]
      operationId: getStockMovement
      summary: Get stock movement by id
      responses:
        '200':
          description: Stock movement found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockMovementResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/StockMovementNotFound'

components:
  schemas:
    PlanStockMovementRequest:
      type: object
      required: [code, partnerCode, skuCode, locationId, movementType, quantity]
      properties:
        code:
          type: string
          pattern: '^[A-Z0-9][A-Z0-9-]{2,63}$'
          example: SM-2026-0001
        partnerCode:
          type: string
          maxLength: 64
          example: PT-ACME-CORP
        skuCode:
          type: string
          maxLength: 64
          example: SKU-COCA-COLA-500ML
        locationId:
          type: string
          maxLength: 64
          example: LOC-WAREHOUSE-EAST
        movementType:
          type: string
          enum: [INBOUND, OUTBOUND, ADJUSTMENT]
        quantity:
          type: integer
          format: int32
          minimum: 1
          maximum: 1000000
        referenceCode:
          type: string
          maxLength: 128
          description: External reference (ASN number, shipment instruction id, etc.)

    StockMovementResponse:
      type: object
      required: [id, code, partnerCode, skuCode, locationId, movementType, quantity, status, version]
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        partnerCode:
          type: string
        skuCode:
          type: string
        locationId:
          type: string
        movementType:
          type: string
          enum: [INBOUND, OUTBOUND, ADJUSTMENT]
        quantity:
          type: integer
          format: int32
        status:
          type: string
          enum: [PLANNED, RECEIVED, DISPATCHED, CANCELLED]
        referenceCode:
          type: string
        version:
          type: integer
          format: int64

    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, format: int32 }
        detail: { type: string }
        errorCode: { type: string }
        traceId: { type: string }

  responses:
    Unauthorized:
      description: Not authenticated, JWT invalid/expired
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    ValidationError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    StockMovementNotFound:
      description: Stock movement does not exist in this tenant
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
