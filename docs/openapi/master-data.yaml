openapi: 3.0.3
info:
  title: Master Data API
  description: |
    Multi-tenant inventory platform — Master Data service.

    Manages SKU, Location, and Partner master records shared across all four sub-systems.
    MVP scope: SKU create + get. Location and Partner are future iterations.

    Bridge multi-tenancy: each tenant has its own schema; Master Data is per-tenant.
    Errors follow RFC 7807; `errorCode` is the i18n key.
  version: 1.0.0

servers:
  - url: https://api.example.com/master-data
    description: Production
  - url: http://localhost:8080
    description: Local dev

tags:
  - name: skus
    description: SKU master records

security:
  - bearerJwt: []

paths:
  /v1/skus:
    post:
      tags: [skus]
      operationId: createSku
      summary: Register a new SKU
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSkuRequest'
      responses:
        '201':
          description: SKU created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkuResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: SKU code already exists in this tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /v1/skus/{skuId}:
    parameters:
      - name: skuId
        in: path
        required: true
        schema:
          type: integer
          format: int64
          minimum: 1
    get:
      tags: [skus]
      operationId: getSku
      summary: Get SKU by id
      responses:
        '200':
          description: SKU found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkuResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/SkuNotFound'

components:
  schemas:
    CreateSkuRequest:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          pattern: '^[A-Z0-9][A-Z0-9-]{2,63}$'
          description: SKU code (uppercase + digits + hyphen, 3-64 chars). Unique per tenant.
          example: SKU-COCA-COLA-500ML
        name:
          type: string
          minLength: 1
          maxLength: 200
          example: コカ・コーラ 500ml
        description:
          type: string
          maxLength: 1000
        unitOfMeasure:
          type: string
          maxLength: 32
          example: BOTTLE

    SkuResponse:
      type: object
      required: [id, code, name, version]
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        description:
          type: string
        unitOfMeasure:
          type: string
        version:
          type: integer
          format: int64

    ProblemDetail:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, format: int32 }
        detail: { type: string }
        errorCode: { type: string }
        traceId: { type: string }

  responses:
    Unauthorized:
      description: Not authenticated, JWT invalid/expired
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    ValidationError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    SkuNotFound:
      description: SKU does not exist in this tenant
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  securitySchemes:
    bearerJwt:
      type: http
      scheme: bearer
      bearerFormat: JWT
