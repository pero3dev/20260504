spring:
  application:
    name: identity-broker
  config:
    import: classpath:application-resilience-defaults.yml
  datasource:
    url: ${IDENTITY_DB_URL:jdbc:postgresql://localhost:5432/identity_broker}
    username: ${IDENTITY_DB_USER:identity_broker_app}
    password: ${IDENTITY_DB_PASSWORD:dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 3
  flyway:
    # K8s Job 先行実行(ADR-0013)。アプリ起動時の自動実行は無効。
    enabled: false
    # サービスごとに classpath を分けて、e2e で複数サービスが同じ classpath にいても V1 の衝突を避ける
    locations: classpath:db/migration/identity-broker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true

mybatis:
  mapper-locations: classpath*:mapper/identity-broker/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8081}

platform:
  identity:
    issuer: ${IDENTITY_ISSUER:https://idp.example.com/}
    # F2 phase C: 外部 IdP(Cognito 等) federation 設定。 issuer-uri が空ならエンドポイントは 401。
    # 通常 prod は infra/cognito の CDK 出力(User Pool issuer / domain client id)を K8s Secret 経由で渡す。
    federation:
      issuer-uri: ${FEDERATION_ISSUER_URI:}
      jwks-uri: ${FEDERATION_JWKS_URI:}
      subject-claim: ${FEDERATION_SUBJECT_CLAIM:email}
      audience-claim: ${FEDERATION_AUDIENCE_CLAIM:client_id}
      audience: ${FEDERATION_AUDIENCE:}
      # SAML JIT(Just-In-Time)provisioning 設定。 default 無効。
      # enabled=true の時、 IdP 認証成功で内部 User 不在なら default tenant + role で
      # User + TenantMembership を自動作成。 SCIM の代替経路で、 列挙攻撃対策のため成功 / 失敗
      # は server log に分類可能な情報を残す(client には全て 401)。
      jit:
        enabled: ${FEDERATION_JIT_ENABLED:false}
        default-tenant-id: ${FEDERATION_JIT_DEFAULT_TENANT_ID:}
        default-role: ${FEDERATION_JIT_DEFAULT_ROLE:VIEWER}
  snowflake:
    worker-id: ${POD_ORDINAL:0}
  outbox:
    enabled: true
    publisher-enabled: true
    poll-interval: PT1S
    batch-size: 200
    tenants:
      - platform   # Identity Broker 用の擬似テナント。将来 Identity 連携に置換

application:
  env: ${APP_ENV:local}

logging:
  config: classpath:logback-spring.xml
