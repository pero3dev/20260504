spring:
  application:
    name: identity-broker
  config:
    import: classpath:application-resilience-defaults.yml
  datasource:
    url: ${IDENTITY_DB_URL:jdbc:postgresql://localhost:5432/identity_broker}
    username: ${IDENTITY_DB_USER:identity_broker_app}
    password: ${IDENTITY_DB_PASSWORD:dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 3
  flyway:
    # K8s Job 先行実行(ADR-0013)。アプリ起動時の自動実行は無効。
    enabled: false
    # サービスごとに classpath を分けて、e2e で複数サービスが同じ classpath にいても V1 の衝突を避ける
    locations: classpath:db/migration/identity-broker
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8081}

platform:
  identity:
    issuer: ${IDENTITY_ISSUER:https://idp.example.com/}
  snowflake:
    worker-id: ${POD_ORDINAL:0}
  outbox:
    enabled: true
    publisher-enabled: true
    poll-interval: PT1S
    batch-size: 200
    tenants:
      - platform   # Identity Broker 用の擬似テナント。将来 Identity 連携に置換

application:
  env: ${APP_ENV:local}

logging:
  config: classpath:logback-spring.xml
