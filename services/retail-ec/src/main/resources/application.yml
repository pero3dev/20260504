spring:
  application:
    name: retail-ec
  config:
    import: classpath:application-resilience-defaults.yml
  datasource:
    url: ${RETAIL_EC_DB_URL:jdbc:postgresql://localhost:5432/retail_ec}
    username: ${RETAIL_EC_DB_USER:retail_ec_app}
    password: ${RETAIL_EC_DB_PASSWORD:dev}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
  flyway:
    enabled: false
    locations: classpath:db/migration/retail-ec
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_BROKER_ISSUER:https://idp.example.com/}

mybatis:
  mapper-locations: classpath*:mapper/retail-ec/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8085}

platform:
  snowflake:
    worker-id: ${POD_ORDINAL:0}
  outbox:
    enabled: true
    publisher-enabled: true
    poll-interval: PT1S
    batch-size: 200
    tenants:
      - dev

application:
  env: ${APP_ENV:local}

logging:
  config: classpath:logback-spring.xml
