spring:
  application:
    name: manufacturing
  config:
    import: classpath:application-resilience-defaults.yml
  datasource:
    url: ${MANUFACTURING_DB_URL:jdbc:postgresql://localhost:5432/manufacturing}
    username: ${MANUFACTURING_DB_USER:manufacturing_app}
    password: ${MANUFACTURING_DB_PASSWORD:dev}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
  flyway:
    enabled: false
    locations: classpath:db/migration/manufacturing
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      properties:
        enable.idempotence: true
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate
      concurrency: 1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_BROKER_ISSUER:https://idp.example.com/}

mybatis:
  mapper-locations: classpath*:mapper/manufacturing/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8088}

platform:
  snowflake:
    worker-id: ${POD_ORDINAL:0}
  outbox:
    enabled: true
    publisher-enabled: true
    poll-interval: PT1S
    batch-size: 200
    tenants:
      - dev

application:
  env: ${APP_ENV:local}

logging:
  config: classpath:logback-spring.xml
