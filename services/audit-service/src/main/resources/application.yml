spring:
  application:
    name: audit-service
  config:
    import: classpath:application-resilience-defaults.yml
  datasource:
    url: ${AUDIT_DB_URL:jdbc:postgresql://localhost:5432/audit_service}
    username: ${AUDIT_DB_USER:audit_service_app}
    password: ${AUDIT_DB_PASSWORD:dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 3
  flyway:
    enabled: false
    locations: classpath:db/migration/audit-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: audit-service
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate
      concurrency: 3

mybatis:
  mapper-locations: classpath*:mapper/audit-service/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8082}

application:
  env: ${APP_ENV:local}

# ADR-0008 A4: 監査レコード + Merkle anchor の S3 Object Lock(Compliance mode)二重保管。
# デフォルトは無効。 本番では platform.audit.archive.enabled=true + bucket を指定する。
# bucket 側で Object Lock + 1 年 retention を強制(infra/audit-s3 参照)。
platform:
  audit:
    archive:
      enabled: ${PLATFORM_AUDIT_ARCHIVE_ENABLED:false}
      bucket: ${PLATFORM_AUDIT_ARCHIVE_BUCKET:}
      region: ${PLATFORM_AUDIT_ARCHIVE_REGION:ap-northeast-1}
      # LocalStack / MinIO 用。 本番では空。
      endpoint-override: ${PLATFORM_AUDIT_ARCHIVE_ENDPOINT_OVERRIDE:}
      records-prefix: ${PLATFORM_AUDIT_ARCHIVE_RECORDS_PREFIX:audit-records}
      anchors-prefix: ${PLATFORM_AUDIT_ARCHIVE_ANCHORS_PREFIX:audit-anchors}

logging:
  config: classpath:logback-spring.xml
