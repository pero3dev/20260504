spring:
  application:
    name: audit-service
  config:
    import: classpath:application-resilience-defaults.yml
  datasource:
    url: ${AUDIT_DB_URL:jdbc:postgresql://localhost:5432/audit_service}
    username: ${AUDIT_DB_USER:audit_service_app}
    password: ${AUDIT_DB_PASSWORD:dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 3
  flyway:
    enabled: false
    locations: classpath:db/migration/audit-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: audit-service
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate
      concurrency: 3

mybatis:
  mapper-locations: classpath*:mapper/audit-service/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8082}

application:
  env: ${APP_ENV:local}

logging:
  config: classpath:logback-spring.xml
