spring:
  application:
    name: integration-hub
  config:
    import: classpath:application-resilience-defaults.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: integration-hub
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate
      concurrency: 3
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_BROKER_ISSUER:https://idp.example.com/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8091}

application:
  env: ${APP_ENV:local}

# 統合 Hub 個別設定:
# platform.hub.adapters.<adapter-name>.enabled: アダプタの有効化
# platform.hub.adapters.<adapter-name>.<key>: アダプタ固有設定
platform:
  hub:
    adapters:
      retail-order-csv:
        enabled: ${HUB_RETAIL_CSV_ENABLED:false}
        # 出力先ディレクトリ。テナントごとに <baseDir>/<tenant>/ に CSV を追記出力する。
        baseDir: ${HUB_RETAIL_CSV_BASE_DIR:${java.io.tmpdir}/integration-hub}
        fileName: ${HUB_RETAIL_CSV_FILE_NAME:retail-orders.csv}

logging:
  config: classpath:logback-spring.xml
