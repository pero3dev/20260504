spring:
  application:
    name: integration-hub
  config:
    import: classpath:application-resilience-defaults.yml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: integration-hub
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate
      concurrency: 3
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_BROKER_ISSUER:https://idp.example.com/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8091}

application:
  env: ${APP_ENV:local}

# 統合 Hub 個別設定:
# platform.hub.adapters.<adapter-name>.enabled: アダプタの有効化
# platform.hub.adapters.<adapter-name>.type: local | s3(A3 で追加、 default は local)
# platform.hub.adapters.<adapter-name>.<key>: アダプタ固有設定
platform:
  hub:
    adapters:
      retail-order-csv:
        enabled: ${HUB_RETAIL_CSV_ENABLED:false}
        type: ${HUB_RETAIL_CSV_TYPE:local}
        # type=local 用: 出力先ディレクトリ。テナントごとに <baseDir>/<tenant>/ に CSV を追記出力する。
        baseDir: ${HUB_RETAIL_CSV_BASE_DIR:${java.io.tmpdir}/integration-hub}
        fileName: ${HUB_RETAIL_CSV_FILE_NAME:retail-orders.csv}
        # type=s3 用: S3 への 1 注文 = 1 オブジェクト PUT(A3)。
        s3:
          bucket: ${HUB_RETAIL_CSV_S3_BUCKET:}
          region: ${HUB_RETAIL_CSV_S3_REGION:ap-northeast-1}
          key-prefix: ${HUB_RETAIL_CSV_S3_KEY_PREFIX:retail-order-csv}
          # LocalStack / MinIO 用、 本番では空。
          endpoint-override: ${HUB_RETAIL_CSV_S3_ENDPOINT_OVERRIDE:}
          content-type: ${HUB_RETAIL_CSV_S3_CONTENT_TYPE:text/csv}

logging:
  config: classpath:logback-spring.xml
