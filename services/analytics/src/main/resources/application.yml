spring:
  application:
    name: analytics
  config:
    import: classpath:application-resilience-defaults.yml
  datasource:
    url: ${ANALYTICS_DB_URL:jdbc:postgresql://localhost:5432/analytics}
    username: ${ANALYTICS_DB_USER:analytics_app}
    password: ${ANALYTICS_DB_PASSWORD:dev}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 3
  flyway:
    enabled: false
    locations: classpath:db/migration/analytics
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      group-id: analytics
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: manual_immediate
      concurrency: 3
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${IDENTITY_BROKER_ISSUER:https://idp.example.com/}

mybatis:
  mapper-locations: classpath*:mapper/analytics/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: ${SERVER_PORT:8089}

application:
  env: ${APP_ENV:local}

logging:
  config: classpath:logback-spring.xml
