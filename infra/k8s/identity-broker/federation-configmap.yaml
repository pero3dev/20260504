# Identity Broker の federation 構成。 prod では本 ConfigMap を helm/kustomize で生成する想定。
# F2 phase C で追加。
apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-broker-federation
  namespace: inventory-platform
data:
  # Cognito User Pool 由来。 infra/cognito/README.md Step 6 の値を流し込む。
  FEDERATION_ISSUER_URI: "https://cognito-idp.ap-northeast-1.amazonaws.com/ap-northeast-1_XXXXXXXXX"
  FEDERATION_JWKS_URI: "https://cognito-idp.ap-northeast-1.amazonaws.com/ap-northeast-1_XXXXXXXXX/.well-known/jwks.json"
  FEDERATION_SUBJECT_CLAIM: "email"
  FEDERATION_AUDIENCE_CLAIM: "client_id"
---
# 各 Cognito App Client ID(infra/cognito/terraform の `app_client_ids` output)を
# CSV で列挙する。 web app ごとに client を分けても、 各 token の `client_id` claim が
# 許可リストに含まれれば認証成功(A5 follow-up²⁹ で multi-client 対応)。
# 共通親 client を 1 つ立てる場合は単一値 1 つを入れる。 空文字なら audience 検証 OFF
# (推奨されない、 production では必ず CSV を埋める)。
apiVersion: v1
kind: Secret
metadata:
  name: identity-broker-federation
  namespace: inventory-platform
type: Opaque
stringData:
  # 例: "5abc...,6def...,7ghi...,8jkl..." (4 web app の client_id を列挙)
  FEDERATION_AUDIENCE: ""
