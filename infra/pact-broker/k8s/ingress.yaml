# Pact Broker Ingress(ADR-0021 Phase 1)。
#
# - AWS Load Balancer Controller(ALB)経由で internal-only ALB を作成。
# - `alb.ingress.kubernetes.io/scheme: internal` で VPC 内のみアクセス可能。
# - ACM 証明書は環境ごとの ARN を annotation で上書き。
# - host は `pact-broker.internal.example.com`(プレースホルダ、 Phase 1 実装時に確定)。
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pact-broker
  namespace: pact-broker
  labels:
    app.kubernetes.io/name: pact-broker
    app.kubernetes.io/part-of: platform
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    # Phase 1 実装時に環境ごとの ACM ARN へ上書き。
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-1:ACCOUNT_ID:certificate/REPLACE_ME
    alb.ingress.kubernetes.io/healthcheck-path: /diagnostic/status/heartbeat
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"
    # GitHub Actions runner からのアクセス: PrivateLink 経由 or VPC peering で internal ALB に到達する想定。
    # public 露出は禁止(scheme: internal)。
spec:
  rules:
    - host: pact-broker.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pact-broker
                port:
                  number: 80
