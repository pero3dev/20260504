# Pact Broker HorizontalPodAutoscaler(ADR-0021 Phase 1)。
# CI burst(複数 PR が同時 verify)で 2 → 3 にスケール、 idle 時は 2 で固定。
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pact-broker
  namespace: pact-broker
  labels:
    app.kubernetes.io/name: pact-broker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pact-broker
  minReplicas: 2
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
