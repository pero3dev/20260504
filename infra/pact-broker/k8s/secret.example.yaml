# Pact Broker Secret テンプレート(ADR-0021 Phase 1)。
#
# ⚠️ 本ファイルはコミット用テンプレート。 実際の Secret は以下のいずれかで管理:
#   1. AWS Secrets Manager + ExternalSecretsOperator(推奨、 IRSA 経由)
#   2. SealedSecrets(bitnami)で暗号化済 manifest を git に置く
# どちらを採用するかは Platform Team 判断。 ADR-0021 Phase 1 では (1) を想定。
#
# ローカル dev で `kubectl apply` する場合のみ、 値を書き換えて apply してよい。
apiVersion: v1
kind: Secret
metadata:
  name: pact-broker
  namespace: pact-broker
  labels:
    app.kubernetes.io/name: pact-broker
type: Opaque
stringData:
  # Aurora-C の pact_broker DB user の password。
  PACT_BROKER_DATABASE_PASSWORD: REPLACE_ME_VIA_EXTERNAL_SECRETS

  # CI / 開発者から接続する Basic Auth credential。 Phase 2 で Cognito OIDC に置換。
  PACT_BROKER_BASIC_AUTH_USERNAME: REPLACE_ME_VIA_EXTERNAL_SECRETS
  PACT_BROKER_BASIC_AUTH_PASSWORD: REPLACE_ME_VIA_EXTERNAL_SECRETS

  # 読み取り専用ユーザ(エンジニアの UI 閲覧用、 Phase 3 で公開)。
  PACT_BROKER_BASIC_AUTH_READ_ONLY_USERNAME: REPLACE_ME_VIA_EXTERNAL_SECRETS
  PACT_BROKER_BASIC_AUTH_READ_ONLY_PASSWORD: REPLACE_ME_VIA_EXTERNAL_SECRETS
