# Pact Broker pod 用 ServiceAccount。
# IRSA(ADR-0013)で AWS Secrets Manager 等から DB credential を取得する想定。
# IAM Role ARN は環境ごとに `eks.amazonaws.com/role-arn` で上書きする(GitOps overlay)。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pact-broker
  namespace: pact-broker
  annotations:
    # 環境ごとに上書き(dev / staging / prod):
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/pact-broker-prod
  labels:
    app.kubernetes.io/name: pact-broker
    app.kubernetes.io/part-of: platform
