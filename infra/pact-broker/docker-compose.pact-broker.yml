# Pact Broker(local dev / CI 用)— ADR-0019 Phase 3。
#
# Phase 2 までは reactor 内 PactFolder で publish/verify を完結させていたが、
# Phase 3 で can-i-deploy を有効化するため Broker を導入する。
#
# 本 compose は **local dev 用** のスタンダロン構成。プロダクション運用ホスト先(EKS の
# 別 namespace か Pactflow SaaS か)は ADR-0019 Phase 3 完了後に別 ADR で確定する。
#
# 起動: docker compose -f infra/pact-broker/docker-compose.pact-broker.yml up -d
# 停止: docker compose -f infra/pact-broker/docker-compose.pact-broker.yml down -v
#
# UI:    http://localhost:9292
# Auth:  pact_user / pact_password (Basic Auth、 PACT_BROKER_BASIC_AUTH_*)
#
# Test/Prod cluster とは独立した postgres を使うので 5434 にポートをずらしてある
# (load-test は 5433 を使用)。

services:
  pact-broker-db:
    image: postgres:16-alpine
    container_name: pact-broker-db
    environment:
      POSTGRES_DB: pact_broker
      POSTGRES_USER: pact_broker
      POSTGRES_PASSWORD: pact_broker_password
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact_broker -d pact_broker"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pact-broker-pgdata:/var/lib/postgresql/data

  pact-broker:
    image: pactfoundation/pact-broker:2.138.0-pactbroker2.119.0
    container_name: pact-broker
    depends_on:
      pact-broker-db:
        condition: service_healthy
    ports:
      - "9292:9292"
    environment:
      PACT_BROKER_DATABASE_ADAPTER: postgres
      PACT_BROKER_DATABASE_HOST: pact-broker-db
      PACT_BROKER_DATABASE_NAME: pact_broker
      PACT_BROKER_DATABASE_USERNAME: pact_broker
      PACT_BROKER_DATABASE_PASSWORD: pact_broker_password
      PACT_BROKER_BASIC_AUTH_USERNAME: pact_user
      PACT_BROKER_BASIC_AUTH_PASSWORD: pact_password
      PACT_BROKER_PUBLIC_HEARTBEAT: "true"
      PACT_BROKER_LOG_LEVEL: WARN
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q --spider http://pact_user:pact_password@localhost:9292/diagnostic/status/heartbeat || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pact-broker-pgdata:
